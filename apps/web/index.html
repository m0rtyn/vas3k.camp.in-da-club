<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Вастрик.ВКлубе</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script>
      // FOUC prevention: apply theme before React mounts.
      (function () {
        try {
          var raw = localStorage.getItem('vklube-theme');
          var saved = raw ? JSON.parse(raw) : null;
          var theme = saved && (saved.theme === 'dark' || saved.theme === 'light') ? saved.theme : 'system';
          var highContrast = !!(saved && saved.highContrast);
          if (!saved && window.matchMedia && window.matchMedia('(prefers-contrast: more)').matches) {
            highContrast = true;
          }
          var resolved = theme;
          if (theme === 'system') {
            resolved = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
          document.documentElement.setAttribute('data-theme', resolved);
          if (highContrast) document.documentElement.setAttribute('data-contrast', 'more');
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) {
            var color;
            if (highContrast) color = resolved === 'light' ? '#ffffff' : '#000000';
            else color = resolved === 'light' ? '#ffffff' : '#1a1a1a';
            meta.setAttribute('content', color);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
